<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarburstAI — Crypto price & volatility heat dashboard · Therminos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0c14;
      --bg-panel: #0f1220;
      --bg-card: #141928;
      --border: #1e2540;
      --border-soft: #161b2e;
      --starburst: #f5a623;
      --starburst-dim: #e09410;
      --starburst-glow: rgba(245, 166, 35, 0.15);
      --cold: #3b82f6;
      --cold-dim: #2563eb;
      --mild: #22c55e;
      --mild-dim: #16a34a;
      --warm: #eab308;
      --warm-dim: #ca8a04;
      --hot: #f97316;
      --hot-dim: #ea580c;
      --critical: #ef4444;
      --critical-dim: #dc2626;
      --text: #e8ecf4;
      --text-dim: #8b92a8;
      --radius: 14px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
      background-image:
        radial-gradient(ellipse 120% 60% at 50% -20%, rgba(245, 166, 35, 0.08), transparent 50%),
        radial-gradient(ellipse 80% 40% at 80% 60%, rgba(59, 130, 246, 0.04), transparent 45%),
        radial-gradient(ellipse 60% 30% at 10% 80%, rgba(239, 68, 68, 0.03), transparent 40%);
    }
    .app { max-width: 1000px; margin: 0 auto; padding: 1.6rem 1.25rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0 1.5rem;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 1.5rem;
    }
    .logo {
      font-weight: 700;
      font-size: 1.9rem;
      color: var(--starburst);
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, var(--starburst) 0%, var(--starburst-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline { font-size: 0.82rem; color: var(--text-dim); margin-top: 0.35rem; }
    .header-right { display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap; }
    .wallet-addr { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--mild); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    .contract-in { width: 260px; padding: 0.5rem 0.75rem; font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); }
    .btn {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
    }
    .btn:hover { border-color: var(--starburst-dim); color: var(--starburst); }
    .btn.primary { background: var(--starburst-dim); border-color: var(--starburst); color: #0a0c14; }
    .btn.primary:hover { box-shadow: 0 0 22px var(--starburst-glow); }
